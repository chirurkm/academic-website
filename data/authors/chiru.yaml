bio: |
  I am a Beatriu de Pinós Postdoctoral Fellow at the Institut de Ciències del Cosmos,
  Universitat de Barcelona. My research focuses on nuclear astrophysics, with particular
  emphasis on the equation of state of dense matter, neutron star structure, and
  multi-messenger astrophysics. I develop nuclear metamodels and Bayesian inference
  frameworks to constrain the properties of dense matter using gravitational wave
  observations from binary neutron star mergers. I am a member of the Einstein Telescope
  and Virgo collaborations, and one of the three coordinators of Division 6 (Nuclear
  Physics and Dense Matter) of the Einstein Telescope collaboration, contributing to
  the study of nuclear physics with next-generation gravitational wave detectors.

